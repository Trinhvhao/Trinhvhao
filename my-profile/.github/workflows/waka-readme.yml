name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 0"

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          BLOCKS: ⣿
          SHOW_TIME: true
          SHOW_TOTAL: true
          CODE_LANG: true
          LANG_COUNT: 8
